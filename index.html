<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a242b; color: #e2e8ec; min-height: 100vh; padding: 22px 28px 32px; overflow-x: hidden; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; padding-bottom: 14px; border-bottom: 2px solid #f68b20; }
  .header h1 { font-size: 28px; font-weight: 700; color: #fff; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .live-badge { display: flex; align-items: center; gap: 7px; background: rgba(246,139,32,0.12); border: 1px solid rgba(246,139,32,0.35); border-radius: 6px; padding: 6px 14px; font-size: 13px; color: #f68b20; font-weight: 700; letter-spacing: 0.8px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #f68b20; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .last-updated { font-size: 13px; color: #4a5a64; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 2px; margin-bottom: 26px; background: #222e37; border-radius: 10px; overflow: hidden; }
  .summary-card { padding: 20px 24px; border-right: 1px solid #2a3640; }
  .summary-card:last-child { border-right: none; }
  .summary-card .label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #4a5a64; margin-bottom: 8px; }
  .summary-card .value { font-size: 42px; font-weight: 700; color: #fff; line-height: 1; }
  .summary-card.orange .value { color: #f68b20; }
  .summary-card.red .value { color: #f15d25; }
  .summary-card.green .value { color: #22c55e; }
  .summary-card.yellow .value { color: #eab308; }
  .summary-card .sub { font-size: 12px; color: #3a4a54; margin-top: 6px; }
  .team-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #4a5a64; margin-bottom: 12px; }
  .team-stage { position: relative; min-height: 400px; }
  .team-panel { display: none; animation: fadein 0.4s ease; }
  .team-panel.active { display: block; }
  @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .team-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .team-name { font-size: 20px; font-weight: 700; color: #f68b20; text-transform: uppercase; letter-spacing: 1px; }
  .team-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .team-pill { font-size: 13px; color: #7a8a94; background: #222e37; border-radius: 5px; padding: 5px 12px; }
  .team-pill strong { color: #c8d4da; }
  .tech-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
  .tech-card { background: #222e37; border-radius: 10px; padding: 18px 20px; border-left: 5px solid #2a3a44; }
  .tech-card.hi  { border-left-color: #22c55e; }
  .tech-card.mid { border-left-color: #eab308; }
  .tech-card.lo  { border-left-color: #f15d25; }
  .tech-card-top { margin-bottom: 16px; }
  .tech-card-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
  .tech-card-level { display: inline-block; font-size: 13px; font-weight: 600; color: #5a6a74; background: #1a242b; border-radius: 4px; padding: 3px 10px; }
  .tech-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tech-stat { text-align: center; background: #1a242b; border-radius: 8px; padding: 12px 6px; }
  .tech-stat .sv { font-size: 28px; font-weight: 700; color: #c8d4da; line-height: 1; }
  .tech-stat .sv.green  { color: #22c55e; }
  .tech-stat .sv.yellow { color: #eab308; }
  .tech-stat .sv.red    { color: #f15d25; }
  .tech-stat .sl { font-size: 12px; font-weight: 700; color: #4a5a64; text-transform: uppercase; letter-spacing: 0.6px; margin-top: 6px; }
  .team-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 16px; border-top: 1px solid #222e37; }
  .team-dots { display: flex; gap: 8px; align-items: center; }
  .team-dot { height: 4px; width: 28px; border-radius: 2px; background: #222e37; cursor: pointer; transition: all 0.2s; }
  .team-dot.active { background: #f68b20; width: 44px; }
  .nav-btn { background: #222e37; border: 1px solid #2a3640; border-radius: 8px; color: #c8d4da; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { background: #f68b20; color: #1a242b; border-color: #f68b20; }
  .progress-bar-wrap { flex: 1; margin: 0 20px; height: 3px; background: #222e37; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #f68b20; border-radius: 2px; }
  .config-banner { background: #2a1e00; border: 1px solid #f68b20; border-radius: 8px; padding: 12px 18px; font-size: 13px; color: #f68b20; margin-bottom: 20px; display: none; }
  code { background: #1a242b; border-radius: 4px; padding: 1px 6px; font-size: 12px; color: #f15d25; }
  .state-msg { text-align: center; padding: 60px 20px; color: #4a5a64; font-size: 15px; }
</style>
</head>
<body>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/a/macros/repairbit.io/s/AKfycbwGVtzMeztx5KhqINxUw1PA7Tsw_ffInr5a0VFs4UlHr5JdhTEJutRDHbTro_uygfNNvA/exec";
  const REFRESH_MS     = 30000;
  const TEAM_ROTATE_MS = 30000;
</script>
<div class="config-banner" id="configBanner">&#9888;&nbsp; Showing demo data. Replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> with your Apps Script URL.</div>

  <div class="header"><h1>Lab Dashboard</h1><div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="last-updated" id="lastUpdated">Connecting...</div></div>
</div>
<div class="summary-grid">
  <div class="summary-card orange"><div class="label">Total Touches</div><div class="value" id="s-touches">—</div><div class="sub">All lab activity</div></div>
  <div class="summary-card"><div class="label">Unique Touches</div><div class="value" id="s-unique">—</div><div class="sub">Distinct serial numbers</div></div>
  <div class="summary-card"><div class="label">Total Repairs</div><div class="value" id="s-repairs">—</div><div class="sub">Repaired outcomes</div></div>
  <div class="summary-card" id="s-pct-card"><div class="label">Overall Repair %</div><div class="value" id="s-pct">—</div><div class="sub">Repairs / unique touches</div></div>
</div>
<div class="team-label">Teams</div>
<div class="team-stage" id="teamStage"><div class="state-msg">Loading team data...</div></div>
<div class="team-nav" id="teamNav" style="display:none;">
  <button class="nav-btn" onclick="navigate(-1)">&#8592; Prev</button>
  <div class="team-dots" id="teamDots"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
  <button class="nav-btn" onclick="navigate(1)">Next &#8594;</button>
</div>
<script>
let allData=[], teams=[], currentTeam=0, rotateTimer=null, progTimer=null, progStart=null;

async function fetchData() {
  if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    document.getElementById("configBanner").style.display = "block";
    useDemoData(); return;
  }
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
    const json = await res.json();
    allData = json.rows || [];
    renderAll();
    document.getElementById("lastUpdated").textContent = "Updated " + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch(e) {
    document.getElementById("lastUpdated").textContent = "Connection error — retrying...";
  }
}

function computeLabSummary(rows) {
  const touches = rows.length;
  const unique  = new Set(rows.map(r => r["Serial Number"]).filter(Boolean)).size;
  const repairs = rows.filter(r => r.Outcome === "Repaired").length;
  const pct     = unique > 0 ? Math.round((repairs / unique) * 100) : 0;
  return { touches, unique, repairs, pct };
}

function computeTechStats(rows) {
  const touches    = rows.length;
  const repairs    = rows.filter(r => r.Outcome === "Repaired").length;
  const giveups    = rows.filter(r => r.Outcome === "Give Up").length;
  const graveyards = rows.filter(r => r.Outcome === "Graveyard").length;
  const pct        = touches > 0 ? Math.round((repairs / touches) * 100) : 0;
  return { touches, repairs, giveups, graveyards, pct };
}

function renderAll() {
  const lab = computeLabSummary(allData);
  document.getElementById("s-touches").textContent = lab.touches.toLocaleString();
  document.getElementById("s-unique").textContent  = lab.unique.toLocaleString();
  document.getElementById("s-repairs").textContent = lab.repairs.toLocaleString();
  document.getElementById("s-pct").textContent     = lab.pct + "%";

  const teamMap = {};
  allData.forEach(row => {
    const t = row.Team || ""; if (!t) return;
    const n = row.Name || "Unknown";
    if (!teamMap[t]) teamMap[t] = {};
    if (!teamMap[t][n]) teamMap[t][n] = { rows: [], level: row.Level || "" };
    teamMap[t][n].rows.push(row);
  });

  teams = Object.keys(teamMap).sort((a, b) => {
    const na = parseInt(a.replace(/\D/g,"")), nb = parseInt(b.replace(/\D/g,""));
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });

  const stage = document.getElementById("teamStage");
  stage.innerHTML = "";

  teams.forEach((team, idx) => {
    const techMap = teamMap[team];
    const techNames = Object.keys(techMap).sort((a, b) => {
      const sa = computeTechStats(techMap[a].rows);
      const sb = computeTechStats(techMap[b].rows);
      if (sb.repairs !== sa.repairs) return sb.repairs - sa.repairs;
      return sb.pct - sa.pct;
    });
    const teamRows = techNames.flatMap(n => techMap[n].rows);
    const tRepairs = teamRows.filter(r => r.Outcome === "Repaired").length;
    const tGiveups = teamRows.filter(r => r.Outcome === "Give Up").length;
    const tGrave   = teamRows.filter(r => r.Outcome === "Graveyard").length;
    const tPct     = teamRows.length > 0 ? Math.round((tRepairs / teamRows.length) * 100) : 0;

    const cardsHTML = techNames.map(name => {
      const s = computeTechStats(techMap[name].rows);
      const level = techMap[name].level;
      const cls = s.pct >= 75 ? "hi" : s.pct > 50 ? "mid" : "lo";
      const pctColor = s.pct >= 75 ? "green" : s.pct > 50 ? "yellow" : "red";
      return '<div class="tech-card ' + cls + '">' +
        '<div class="tech-card-top">' +
        '<div class="tech-card-name">' + esc(name) + '</div>' +
        (level ? '<span class="tech-card-level">' + esc(level) + '</span>' : '') +
        '</div>' +
        '<div class="tech-stats">' +
        '<div class="tech-stat"><div class="sv">' + s.touches + '</div><div class="sl">Touches</div></div>' +
        '<div class="tech-stat"><div class="sv">' + s.repairs + '</div><div class="sl">Repairs</div></div>' +
        '<div class="tech-stat"><div class="sv">' + s.giveups + '</div><div class="sl">Give-Ups</div></div>' +
        '<div class="tech-stat"><div class="sv ' + pctColor + '">' + s.pct + '%</div><div class="sl">Repair %</div></div>' +
        '</div></div>';
    }).join("");

    const panel = document.createElement("div");
    panel.className = "team-panel" + (idx === currentTeam ? " active" : "");
    panel.id = "team-" + idx;
    panel.innerHTML =
      '<div class="team-header">' +
      '<div class="team-name">' + esc(team) + '</div>' +
      '<div class="team-pills">' +
      '<div class="team-pill"><strong>' + techNames.length + '</strong> techs</div>' +
      '<div class="team-pill"><strong>' + teamRows.length.toLocaleString() + '</strong> touches</div>' +
      '<div class="team-pill"><strong>' + tRepairs.toLocaleString() + '</strong> repairs</div>' +
      '<div class="team-pill"><strong>' + tGiveups + '</strong> give-ups</div>' +
      '<div class="team-pill"><strong>' + tGrave + '</strong> graveyards</div>' +
      '<div class="team-pill"><strong>' + tPct + '%</strong> repair rate</div>' +
      '</div></div>' +
      '<div class="tech-grid">' + cardsHTML + '</div>';
    stage.appendChild(panel);
  });

  const dotsEl = document.getElementById("teamDots");
  dotsEl.innerHTML = teams.map((t, i) =>
    '<div class="team-dot' + (i === currentTeam ? " active" : "") + '" onclick="goToTeam(' + i + ')" title="' + esc(t) + '"></div>'
  ).join("");

  document.getElementById("teamNav").style.display = teams.length > 1 ? "flex" : "none";
  startRotation();
}

function goToTeam(idx) {
  document.querySelectorAll(".team-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".team-dot").forEach(d => d.classList.remove("active"));
  currentTeam = ((idx % teams.length) + teams.length) % teams.length;
  const panel = document.getElementById("team-" + currentTeam);
  if (panel) panel.classList.add("active");
  const dots = document.querySelectorAll(".team-dot");
  if (dots[currentTeam]) dots[currentTeam].classList.add("active");
  resetProgress();
}

function navigate(dir) { goToTeam(currentTeam + dir); }

function startRotation() {
  if (rotateTimer) clearInterval(rotateTimer);
  resetProgress();
  rotateTimer = setInterval(() => goToTeam(currentTeam + 1), TEAM_ROTATE_MS);
}

function resetProgress() {
  if (progTimer) cancelAnimationFrame(progTimer);
  progStart = performance.now();
  animateProgress();
}

function animateProgress() {
  const pct = Math.min(((performance.now() - progStart) / TEAM_ROTATE_MS) * 100, 100);
  document.getElementById("progressBar").style.width = pct + "%";
  if (pct < 100) progTimer = requestAnimationFrame(animateProgress);
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function useDemoData() {
  const tNames = ["Team 1","Team 2","Team 3","Team 4","Training"];
  const levels = ["L1 Tech","L2 Tech","L3 Tech","Lead"];
  const outcomes = ["Repaired","Repaired","Repaired","Repaired","Give Up","Graveyard"];
  const names = [
    ["Jordan M","Riley S","Casey T","Alex P","Morgan W","Sam H"],
    ["Taylor R","Drew K","Jamie L","Pat N","Quinn B","Avery C"],
    ["Blake F","Reese O","Skyler D","Charlie G","Devon A","Frankie J"],
    ["Harley V","Rowan X","Emery Z","Logan U","Sage Y","Peyton I"],
    ["Finley Q","Kendall W","Cam E","Remy R","Shay T","Arlo S"]
  ];
  const rows = [];
  tNames.forEach((team, ti) => {
    names[ti].forEach((name, ni) => {
      const level = levels[ni % levels.length];
      const count = 8 + Math.floor(Math.random() * 12);
      for (let i = 0; i < count; i++) {
        rows.push({ Name: name, Level: level, Team: team,
          "Serial Number": "SN" + (1000 + ti*200 + ni*30 + i),
          Outcome: outcomes[Math.floor(Math.random() * outcomes.length)] });
      }
    });
  });
  allData = rows;
  renderAll();
  document.getElementById("lastUpdated").textContent = "Demo data — not connected to sheet";
}

fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
